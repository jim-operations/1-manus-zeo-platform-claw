<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEO Administrative Network — Interactive Blueprint</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F172A;
            color: #E2E8F0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #graph-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Sidebar Panel */
        #sidebar {
            position: fixed;
            top: 0;
            right: -480px;
            width: 480px;
            height: 100vh;
            background-color: #1E293B;
            border-left: 2px solid #334155;
            padding: 30px;
            overflow-y: auto;
            transition: right 0.3s ease;
            z-index: 100;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
        }

        #sidebar.open {
            right: 0;
        }

        #sidebar-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: 1px solid #475569;
            color: #94A3B8;
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sidebar-close:hover {
            background-color: #334155;
            color: #E2E8F0;
        }

        #sidebar h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #F8FAFC;
            padding-right: 40px;
        }

        #sidebar .node-type-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 3px 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #sidebar .description {
            font-size: 14px;
            line-height: 1.7;
            color: #94A3B8;
            margin-bottom: 25px;
            border-left: 3px solid #3B82F6;
            padding-left: 15px;
        }

        #sidebar h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748B;
            margin-bottom: 12px;
            margin-top: 25px;
        }

        .connection-list {
            list-style: none;
        }

        .connection-list li {
            font-size: 13px;
            padding: 8px 12px;
            margin-bottom: 6px;
            background-color: #0F172A;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .connection-list li:hover {
            border-color: #3B82F6;
            background-color: #1E293B;
        }

        .connection-list li .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .connection-list li .rel-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #64748B;
            margin-left: auto;
        }

        /* Top Bar */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1E293B;
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 50;
        }

        #top-bar h1 {
            font-size: 16px;
            font-weight: 700;
            color: #F8FAFC;
        }

        #top-bar h1 span {
            color: #3B82F6;
        }

        /* Legend */
        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            padding: 20px;
            z-index: 50;
            min-width: 280px;
        }

        #legend h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748B;
            margin-bottom: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #CBD5E1;
            cursor: pointer;
        }

        .legend-item:hover {
            color: #F8FAFC;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Controls */
        #controls {
            position: fixed;
            top: 80px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 50;
        }

        .ctrl-btn {
            width: 40px;
            height: 40px;
            background-color: #1E293B;
            border: 1px solid #334155;
            color: #94A3B8;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background-color: #334155;
            color: #E2E8F0;
        }

        /* Search */
        #search-box {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 50;
        }

        #search-input {
            width: 280px;
            padding: 10px 15px;
            background-color: #1E293B;
            border: 1px solid #334155;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
        }

        #search-input:focus {
            border-color: #3B82F6;
        }

        #search-input::placeholder {
            color: #475569;
        }

        /* Stats bar */
        #stats-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #475569;
            z-index: 50;
            text-align: right;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background-color: #1E293B;
            border: 1px solid #334155;
            padding: 8px 12px;
            font-size: 12px;
            color: #E2E8F0;
            pointer-events: none;
            z-index: 200;
            max-width: 300px;
        }

        /* Link styles */
        .link {
            stroke-opacity: 0.3;
        }

        .link:hover {
            stroke-opacity: 0.8;
        }

        .node-label {
            font-family: 'Inter', sans-serif;
            pointer-events: none;
            text-shadow: 0 0 6px #0F172A, 0 0 12px #0F172A;
        }

        /* Edge labels */
        .edge-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            fill: #475569;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <h1><span>ZEO</span> Administrative Network — Interactive Blueprint for Platform Design <span style="font-size:12px;color:#64748B;margin-left:12px;">Based on ZEO Embilipitiya</span></h1>
    </div>

    <div id="controls">
        <button class="ctrl-btn" id="zoom-in" title="Zoom In">+</button>
        <button class="ctrl-btn" id="zoom-out" title="Zoom Out">−</button>
        <button class="ctrl-btn" id="zoom-reset" title="Reset View">⟲</button>
    </div>

    <div id="search-box">
        <input type="text" id="search-input" placeholder="Search roles, departments, duties...">
    </div>

    <div id="graph-container">
        <svg id="graph-svg"></svg>
    </div>

    <div id="legend">
        <h3>Node Categories</h3>
        <div class="legend-item" data-category="leadership"><div class="legend-dot" style="background:#F59E0B;"></div> Leadership Positions</div>
        <div class="legend-item" data-category="department"><div class="legend-dot" style="background:#3B82F6;"></div> Departments / Divisions</div>
        <div class="legend-item" data-category="role"><div class="legend-dot" style="background:#10B981;"></div> Staff Roles</div>
        <div class="legend-item" data-category="duty"><div class="legend-dot" style="background:#8B5CF6;"></div> Duties / Functions</div>
        <div class="legend-item" data-category="external"><div class="legend-dot" style="background:#EF4444;"></div> External Entities</div>
        <div class="legend-item" data-category="program"><div class="legend-dot" style="background:#EC4899;"></div> Programs / Initiatives</div>
        <div class="legend-item" data-category="stakeholder"><div class="legend-dot" style="background:#06B6D4;"></div> Stakeholders</div>
    </div>

    <div id="stats-bar"></div>

    <div id="sidebar">
        <button id="sidebar-close">✕</button>
        <h2 id="sidebar-title"></h2>
        <div class="node-type-badge" id="sidebar-badge"></div>
        <div class="description" id="sidebar-desc"></div>
        <h3>Connections</h3>
        <ul class="connection-list" id="sidebar-connections"></ul>
    </div>

    <script>
    // ============================================================
    // DATA MODEL — ZEO ADMINISTRATIVE NETWORK
    // ============================================================

    const nodes = [
        // === LEADERSHIP ===
        { id: "zonal_director", label: "Zonal Director\nof Education", category: "leadership", size: 40,
          description: "The chief executive of the Zonal Education Office. Accountable for the overall performance of the zone. Has authority to discipline/replace underperforming principals, allocate resources, and conduct field visits. Appointed under SLEAS service minutes." },
        { id: "deputy_dir_admin", label: "Deputy Director\n(Administration)", category: "leadership", size: 28,
          description: "Oversees the Establishment & General Management Division and the Education Administration Division. Handles HR, school operations, and general administrative matters." },
        { id: "deputy_dir_edu", label: "Deputy Director\n(Development)", category: "leadership", size: 28,
          description: "Oversees the Education Development Division. Responsible for curriculum implementation, teacher professional development, quality assurance, and school improvement programs. Position as designated at ZEO Embilipitiya." },
        { id: "deputy_dir_planning", label: "Deputy Director\n(Planning)", category: "leadership", size: 28,
          description: "Oversees the Planning Division. Responsible for data collection, statistical analysis, and the formulation of zonal education plans and 3-year action plans." },
        { id: "chief_accountant", label: "Chief Accountant", category: "leadership", size: 24,
          description: "Heads the Finance Division. Responsible for all financial matters including budget management, salary processing, procurement, and audit compliance." },

        // === DEPARTMENTS ===
        { id: "dept_establishment", label: "Establishment &\nGeneral Mgmt", category: "department", size: 32,
          description: "Handles all human resource functions for teaching and non-teaching staff: appointments, transfers, promotions, leave, retirement, service records, and disciplinary matters." },
        { id: "dept_edu_admin", label: "Education\nAdministration", category: "department", size: 32,
          description: "Manages school operations: student admissions, timetables, discipline, welfare programs, examination coordination, scholarship distribution, and co-curricular activities." },
        { id: "dept_edu_dev", label: "Education\nDevelopment", category: "department", size: 32,
          description: "Focuses on academic quality: curriculum implementation, teacher professional development (SBTD), school improvement programs (PSI), and quality assurance monitoring." },
        { id: "dept_planning", label: "Planning\nDivision", category: "department", size: 32,
          description: "Responsible for data collection via EMIS, statistical analysis, resource mapping, formulation of zonal education plans, and monitoring & evaluation." },
        { id: "dept_finance", label: "Finance\nDivision", category: "department", size: 32,
          description: "Manages the zonal budget, salary disbursement, procurement, audit queries, EQI fund distribution, and financial compliance." },

        // === STAFF ROLES ===
        { id: "isa", label: "In-Service\nAdvisors (ISAs)", category: "role", size: 26,
          description: "Subject-specialist mentors based at the zonal level. Deliver training, introduce reforms, conduct classroom observations, and provide pedagogical support to teachers. 4,971 teachers expected to join the new ISA service." },
        { id: "subject_specialists", label: "Subject\nSpecialists", category: "role", size: 22,
          description: "Staff with expertise in specific academic subjects. Support curriculum implementation and provide technical guidance to schools and teachers." },
        { id: "admin_officers", label: "Administrative\nOfficers", category: "role", size: 20,
          description: "Handle day-to-day administrative tasks including correspondence, record-keeping, filing, and office management." },
        { id: "development_officers", label: "Development\nOfficers", category: "role", size: 20,
          description: "Support planning and development activities. Assist with data collection, project implementation, and community liaison." },
        { id: "ict_officers", label: "ICT Officers", category: "role", size: 18,
          description: "Manage EMIS data entry, IT infrastructure, and support the digitization of administrative processes." },
        { id: "accounts_staff", label: "Accounts Staff", category: "role", size: 18,
          description: "Process payments, maintain cash books, handle vouchers, manage loan schemes, and support audit preparation." },

        // === DUTIES / FUNCTIONS ===
        { id: "duty_recruitment", label: "Teacher\nRecruitment &\nDeployment", category: "duty", size: 20,
          description: "Identifying vacancies, placing new teachers, and addressing teacher surplus/shortage imbalances across schools." },
        { id: "duty_transfers", label: "Transfers &\nPromotions", category: "duty", size: 20,
          description: "Processing inter-school teacher transfers and managing career promotions for teachers and principals." },
        { id: "duty_training", label: "Professional\nDevelopment &\nTraining", category: "duty", size: 20,
          description: "Facilitating in-service training, School-Based Teacher Development (SBTD), and workshops for teachers." },
        { id: "duty_records", label: "Service Record\nKeeping", category: "duty", size: 18,
          description: "Maintaining personal service files for all staff: salary increments, loan approvals, disciplinary records, and career history." },
        { id: "duty_admissions", label: "Student\nAdmissions", category: "duty", size: 20,
          description: "Supervising and regulating the student admission process to ensure fairness, transparency, and adherence to national circulars." },
        { id: "duty_exams", label: "Public\nExaminations", category: "duty", size: 20,
          description: "Facilitating the local administration of G.C.E. O/L and A/L exams: coordinating centers, ensuring security, and managing logistics." },
        { id: "duty_scholarships", label: "Scholarships &\nGrants", category: "duty", size: 20,
          description: "Managing the Presidential Scholarship Program (116,000 in 2024) and other grant distributions to students." },
        { id: "duty_welfare", label: "Student Welfare\n& Health", category: "duty", size: 18,
          description: "Implementing school feeding programs, nutritional initiatives, drug prevention campaigns, and student counseling services." },
        { id: "duty_textbooks", label: "Textbooks &\nUniforms", category: "duty", size: 18,
          description: "Logistics and distribution of free textbooks, school uniform materials, and other essential learning resources." },
        { id: "duty_supervision", label: "Field\nSupervision", category: "duty", size: 22,
          description: "Regular field visits by Directors and ISAs to monitor curriculum implementation, teaching methodology, and classroom quality." },
        { id: "duty_quality", label: "Quality\nAssurance", category: "duty", size: 22,
          description: "Implementing quality assurance programs, school performance assessments, and ensuring adherence to national education standards." },
        { id: "duty_data", label: "Data Collection\n& Analysis", category: "duty", size: 20,
          description: "Collecting student assessment data, school census data, and analyzing it to identify learning gaps and inform 3-year zonal action plans." },
        { id: "duty_budget", label: "Budget\nManagement", category: "duty", size: 20,
          description: "Preparing and managing the annual zonal education budget, ensuring alignment with provincial and national allocations." },
        { id: "duty_salary", label: "Salary\nProcessing", category: "duty", size: 18,
          description: "Timely processing and disbursement of salaries for all teaching and non-teaching staff within the zone." },
        { id: "duty_procurement", label: "Procurement &\nAudit", category: "duty", size: 18,
          description: "Handling procurement of goods and services, managing tenders, and ensuring compliance with financial regulations and audits." },
        { id: "duty_eqi", label: "EQI Fund\nDistribution", category: "duty", size: 18,
          description: "Distributing Education Quality Inputs (EQI) funds to schools with discretionary power to meet specific local needs." },
        { id: "duty_infrastructure", label: "Infrastructure\nDevelopment", category: "duty", size: 18,
          description: "Implementing school facility upgrades, construction projects, and maintenance programs, often via World Bank-funded projects." },
        { id: "duty_discipline", label: "Accountability\n& Discipline", category: "duty", size: 18,
          description: "Taking disciplinary action against underperforming principals, including replacement. Ensuring leadership accountability at school level." },
        { id: "duty_cocurricular", label: "Co-curricular\nActivities", category: "duty", size: 16,
          description: "Coordinating zonal sports meets, academic competitions, field trips, and student leadership programs." },
        { id: "duty_pirivena", label: "Pirivena\nAdministration", category: "duty", size: 16,
          description: "Managing grants and administrative matters for Pirivena (traditional monastic) schools within the zone." },

        // === EXTERNAL ENTITIES ===
        { id: "ext_moe", label: "Ministry of\nEducation (MOE)", category: "external", size: 30,
          description: "National-level body responsible for policy formulation, national exams, curriculum development, and SLEAS management. Sets the framework within which ZEOs operate." },
        { id: "ext_pde", label: "Provincial Dept\nof Education (PDE)", category: "external", size: 28,
          description: "Provincial-level authority responsible for planning, budgeting, and program implementation. ZEOs report to the PDE and receive directives and funding." },
        { id: "ext_deo", label: "Divisional\nEducation Offices", category: "external", size: 24,
          description: "Sub-zonal offices handling localized supervision, data collection, and materials distribution. Report directly to the ZEO." },
        { id: "ext_nie", label: "National Institute\nof Education (NIE)", category: "external", size: 22,
          description: "Responsible for curriculum development and in-service teacher training programs. ZEOs facilitate the delivery of NIE programs locally." },
        { id: "ext_nec", label: "National Education\nCommission (NEC)", category: "external", size: 20,
          description: "Advises the President on national education policy. Conducts reviews and makes recommendations that affect ZEO operations." },
        { id: "ext_doe", label: "Dept of\nExaminations", category: "external", size: 22,
          description: "Conducts national public examinations (G.C.E. O/L, A/L). ZEOs coordinate the local administration of these exams." },

        // === PROGRAMS / INITIATIVES ===
        { id: "prog_psi", label: "Programme for\nSchool Improvement\n(PSI)", category: "program", size: 22,
          description: "National school-based management policy empowering schools to develop their own improvement plans via SDCs and SMTs, with ZEO support and monitoring." },
        { id: "prog_sbtd", label: "School-Based\nTeacher Dev\n(SBTD)", category: "program", size: 20,
          description: "Professional development program enhancing teacher competencies through school-level mentoring, peer learning, and coaching." },
        { id: "prog_gemp", label: "General Education\nModernization\nProject", category: "program", size: 22,
          description: "World Bank-funded project ($50M additional financing, June 2025) to upgrade school facilities and improve teaching quality, targeting underserved schools." },
        { id: "prog_emis", label: "Education Mgmt\nInfo System\n(EMIS)", category: "program", size: 20,
          description: "National data system for school census, student records, and educational statistics. Not yet fully automated — a key modernization priority." },
        { id: "prog_presidential", label: "Presidential\nScholarship\nProgram", category: "program", size: 18,
          description: "National scholarship program distributing 116,000 scholarships (2024) to underprivileged students. ZEOs manage local distribution." },

        // === STAKEHOLDERS ===
        { id: "stake_principals", label: "School\nPrincipals", category: "stakeholder", size: 24,
          description: "Head teachers of government schools. Report to the ZEO. Subject to performance evaluation, transfers, and disciplinary action by the Zonal Director." },
        { id: "stake_teachers", label: "Teachers", category: "stakeholder", size: 26,
          description: "Teaching staff of government schools. Their entire career lifecycle (recruitment, deployment, training, transfers, promotions, records) is managed by the ZEO." },
        { id: "stake_students", label: "Students", category: "stakeholder", size: 24,
          description: "The primary beneficiaries of the education system. ZEOs impact students through admissions, exams, scholarships, welfare, and quality assurance." },
        { id: "stake_parents", label: "Parents &\nCommunity", category: "stakeholder", size: 20,
          description: "Engaged through School Development Committees (SDCs) and Alumni Associations. Participate in school governance and improvement planning." },
        { id: "stake_sdc", label: "School Development\nCommittees (SDCs)", category: "stakeholder", size: 20,
          description: "Community-level governance bodies that participate in school improvement planning under the PSI framework. Empowered by ZEO support." },
        { id: "stake_smt", label: "School Management\nTeams (SMTs)", category: "stakeholder", size: 18,
          description: "Internal school management bodies responsible for day-to-day school operations and implementing improvement plans." },
    ];

    const links = [
        // === ZONAL DIRECTOR → DEPUTY DIRECTORS ===
        { source: "zonal_director", target: "deputy_dir_admin", label: "oversees", strength: 3 },
        { source: "zonal_director", target: "deputy_dir_edu", label: "oversees", strength: 3 },
        { source: "zonal_director", target: "deputy_dir_planning", label: "oversees", strength: 3 },
        { source: "zonal_director", target: "chief_accountant", label: "oversees", strength: 3 },

        // === DEPUTY DIRECTORS → DEPARTMENTS ===
        { source: "deputy_dir_admin", target: "dept_establishment", label: "heads", strength: 3 },
        { source: "deputy_dir_admin", target: "dept_edu_admin", label: "heads", strength: 3 },
        { source: "deputy_dir_edu", target: "dept_edu_dev", label: "heads", strength: 3 },
        { source: "deputy_dir_planning", target: "dept_planning", label: "heads", strength: 3 },
        { source: "chief_accountant", target: "dept_finance", label: "heads", strength: 3 },

        // === DEPARTMENTS → STAFF ROLES ===
        { source: "dept_edu_dev", target: "isa", label: "deploys", strength: 2 },
        { source: "dept_edu_dev", target: "subject_specialists", label: "deploys", strength: 2 },
        { source: "dept_establishment", target: "admin_officers", label: "staffed by", strength: 2 },
        { source: "dept_planning", target: "development_officers", label: "staffed by", strength: 2 },
        { source: "dept_planning", target: "ict_officers", label: "staffed by", strength: 2 },
        { source: "dept_finance", target: "accounts_staff", label: "staffed by", strength: 2 },

        // === DEPARTMENTS → DUTIES ===
        // Establishment
        { source: "dept_establishment", target: "duty_recruitment", label: "performs", strength: 2 },
        { source: "dept_establishment", target: "duty_transfers", label: "performs", strength: 2 },
        { source: "dept_establishment", target: "duty_records", label: "performs", strength: 2 },
        { source: "dept_establishment", target: "duty_discipline", label: "performs", strength: 2 },
        { source: "dept_establishment", target: "duty_pirivena", label: "performs", strength: 1 },

        // Education Administration
        { source: "dept_edu_admin", target: "duty_admissions", label: "performs", strength: 2 },
        { source: "dept_edu_admin", target: "duty_exams", label: "performs", strength: 2 },
        { source: "dept_edu_admin", target: "duty_scholarships", label: "performs", strength: 2 },
        { source: "dept_edu_admin", target: "duty_welfare", label: "performs", strength: 2 },
        { source: "dept_edu_admin", target: "duty_textbooks", label: "performs", strength: 2 },
        { source: "dept_edu_admin", target: "duty_cocurricular", label: "performs", strength: 1 },

        // Education Development
        { source: "dept_edu_dev", target: "duty_training", label: "performs", strength: 2 },
        { source: "dept_edu_dev", target: "duty_supervision", label: "performs", strength: 2 },
        { source: "dept_edu_dev", target: "duty_quality", label: "performs", strength: 2 },

        // Planning
        { source: "dept_planning", target: "duty_data", label: "performs", strength: 2 },

        // Finance
        { source: "dept_finance", target: "duty_budget", label: "performs", strength: 2 },
        { source: "dept_finance", target: "duty_salary", label: "performs", strength: 2 },
        { source: "dept_finance", target: "duty_procurement", label: "performs", strength: 2 },
        { source: "dept_finance", target: "duty_eqi", label: "performs", strength: 2 },
        { source: "dept_finance", target: "duty_infrastructure", label: "performs", strength: 1 },

        // === ZONAL DIRECTOR → DIRECT DUTIES ===
        { source: "zonal_director", target: "duty_supervision", label: "conducts", strength: 2 },
        { source: "zonal_director", target: "duty_discipline", label: "exercises authority", strength: 2 },

        // === ISAs → DUTIES ===
        { source: "isa", target: "duty_training", label: "delivers", strength: 2 },
        { source: "isa", target: "duty_supervision", label: "conducts", strength: 2 },
        { source: "isa", target: "duty_quality", label: "supports", strength: 1 },

        // === DUTIES → PROGRAMS ===
        { source: "duty_training", target: "prog_sbtd", label: "implements", strength: 2 },
        { source: "duty_quality", target: "prog_psi", label: "implements", strength: 2 },
        { source: "duty_data", target: "prog_emis", label: "feeds into", strength: 2 },
        { source: "duty_infrastructure", target: "prog_gemp", label: "implements", strength: 2 },
        { source: "duty_scholarships", target: "prog_presidential", label: "distributes", strength: 2 },
        { source: "duty_supervision", target: "prog_psi", label: "monitors", strength: 1 },

        // === EXTERNAL ENTITIES → ZEO ===
        { source: "ext_moe", target: "zonal_director", label: "sets policy for", strength: 2 },
        { source: "ext_pde", target: "zonal_director", label: "directs & funds", strength: 3 },
        { source: "zonal_director", target: "ext_deo", label: "supervises", strength: 2 },
        { source: "ext_nie", target: "dept_edu_dev", label: "provides curriculum", strength: 2 },
        { source: "ext_nie", target: "isa", label: "trains", strength: 1 },
        { source: "ext_nec", target: "ext_moe", label: "advises", strength: 1 },
        { source: "ext_doe", target: "duty_exams", label: "conducts nationally", strength: 2 },

        // === STAKEHOLDERS → ZEO ===
        { source: "stake_principals", target: "zonal_director", label: "reports to", strength: 2 },
        { source: "duty_recruitment", target: "stake_teachers", label: "deploys", strength: 2 },
        { source: "duty_transfers", target: "stake_teachers", label: "transfers", strength: 2 },
        { source: "duty_training", target: "stake_teachers", label: "trains", strength: 2 },
        { source: "duty_records", target: "stake_teachers", label: "maintains files", strength: 1 },
        { source: "duty_salary", target: "stake_teachers", label: "pays", strength: 2 },
        { source: "duty_admissions", target: "stake_students", label: "enrolls", strength: 2 },
        { source: "duty_exams", target: "stake_students", label: "examines", strength: 2 },
        { source: "duty_scholarships", target: "stake_students", label: "awards", strength: 2 },
        { source: "duty_welfare", target: "stake_students", label: "supports", strength: 2 },
        { source: "duty_textbooks", target: "stake_students", label: "provides", strength: 1 },
        { source: "duty_discipline", target: "stake_principals", label: "holds accountable", strength: 2 },
        { source: "prog_psi", target: "stake_sdc", label: "empowers", strength: 2 },
        { source: "prog_psi", target: "stake_smt", label: "empowers", strength: 2 },
        { source: "stake_parents", target: "stake_sdc", label: "participates in", strength: 1 },
        { source: "ext_deo", target: "stake_principals", label: "supervises locally", strength: 1 },

        // === CROSS-DEPARTMENT CONNECTIONS ===
        { source: "dept_planning", target: "dept_edu_dev", label: "informs strategy", strength: 1 },
        { source: "dept_planning", target: "dept_finance", label: "informs budget", strength: 1 },
        { source: "dept_establishment", target: "dept_finance", label: "salary data", strength: 1 },
        { source: "duty_eqi", target: "stake_principals", label: "funds distributed to", strength: 1 },
    ];

    // ============================================================
    // COLOR MAP
    // ============================================================
    const colorMap = {
        leadership: "#F59E0B",
        department: "#3B82F6",
        role: "#10B981",
        duty: "#8B5CF6",
        external: "#EF4444",
        program: "#EC4899",
        stakeholder: "#06B6D4"
    };

    // ============================================================
    // D3 FORCE SIMULATION
    // ============================================================
    const width = window.innerWidth;
    const height = window.innerHeight;

    const svg = d3.select("#graph-svg");
    const g = svg.append("g");

    // Zoom behavior
    const zoom = d3.zoom()
        .scaleExtent([0.2, 4])
        .on("zoom", (event) => {
            g.attr("transform", event.transform);
        });

    svg.call(zoom);

    // Controls
    d3.select("#zoom-in").on("click", () => svg.transition().call(zoom.scaleBy, 1.3));
    d3.select("#zoom-out").on("click", () => svg.transition().call(zoom.scaleBy, 0.7));
    d3.select("#zoom-reset").on("click", () => svg.transition().call(zoom.transform, d3.zoomIdentity));

    // Simulation
    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(d => 120 / (d.strength || 1)))
        .force("charge", d3.forceManyBody().strength(-400))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(d => d.size + 20))
        .force("x", d3.forceX(width / 2).strength(0.03))
        .force("y", d3.forceY(height / 2).strength(0.03));

    // Draw links
    const link = g.append("g")
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke", d => {
            const sourceNode = nodes.find(n => n.id === (typeof d.source === 'string' ? d.source : d.source.id));
            return sourceNode ? colorMap[sourceNode.category] : "#475569";
        })
        .attr("stroke-width", d => d.strength || 1);

    // Edge labels
    const edgeLabel = g.append("g")
        .selectAll("text")
        .data(links)
        .join("text")
        .attr("class", "edge-label")
        .text(d => d.label)
        .attr("text-anchor", "middle");

    // Draw nodes
    const node = g.append("g")
        .selectAll("circle")
        .data(nodes)
        .join("circle")
        .attr("r", d => d.size)
        .attr("fill", d => colorMap[d.category])
        .attr("stroke", d => d3.color(colorMap[d.category]).brighter(0.5))
        .attr("stroke-width", 2)
        .attr("cursor", "pointer")
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));

    // Node labels
    const label = g.append("g")
        .selectAll("text")
        .data(nodes)
        .join("text")
        .attr("class", "node-label")
        .attr("text-anchor", "middle")
        .attr("fill", "#E2E8F0")
        .attr("font-size", d => Math.max(10, d.size / 3))
        .attr("font-weight", d => d.category === "leadership" ? 700 : 400)
        .each(function(d) {
            const lines = d.label.split("\n");
            const el = d3.select(this);
            lines.forEach((line, i) => {
                el.append("tspan")
                    .attr("x", 0)
                    .attr("dy", i === 0 ? `-${(lines.length - 1) * 0.5}em` : "1.1em")
                    .text(line);
            });
        });

    // Tick
    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        edgeLabel
            .attr("x", d => (d.source.x + d.target.x) / 2)
            .attr("y", d => (d.source.y + d.target.y) / 2);

        node
            .attr("cx", d => d.x)
            .attr("cy", d => d.y);

        label
            .attr("x", d => d.x)
            .attr("y", d => d.y - d.size - 8);
    });

    // Drag functions
    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
    }

    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }

    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }

    // ============================================================
    // INTERACTIVITY
    // ============================================================

    // Node click → Sidebar
    node.on("click", (event, d) => {
        event.stopPropagation();
        openSidebar(d);
        highlightConnections(d);
    });

    // Click background to deselect
    svg.on("click", () => {
        closeSidebar();
        resetHighlight();
    });

    function openSidebar(d) {
        const sidebar = document.getElementById("sidebar");
        document.getElementById("sidebar-title").textContent = d.label.replace(/\n/g, " ");
        const badge = document.getElementById("sidebar-badge");
        badge.textContent = d.category;
        badge.style.backgroundColor = colorMap[d.category];
        badge.style.color = "#0F172A";
        document.getElementById("sidebar-desc").textContent = d.description;

        // Find connections
        const connList = document.getElementById("sidebar-connections");
        connList.innerHTML = "";

        links.forEach(l => {
            const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
            const targetId = typeof l.target === 'string' ? l.target : l.target.id;

            let connectedNode = null;
            let direction = "";

            if (sourceId === d.id) {
                connectedNode = nodes.find(n => n.id === targetId);
                direction = "→";
            } else if (targetId === d.id) {
                connectedNode = nodes.find(n => n.id === sourceId);
                direction = "←";
            }

            if (connectedNode) {
                const li = document.createElement("li");
                li.innerHTML = `
                    <span class="dot" style="background:${colorMap[connectedNode.category]}"></span>
                    <span>${direction} ${connectedNode.label.replace(/\n/g, " ")}</span>
                    <span class="rel-label">${l.label}</span>
                `;
                li.addEventListener("click", () => {
                    const targetNode = nodes.find(n => n.id === connectedNode.id);
                    openSidebar(targetNode);
                    highlightConnections(targetNode);
                });
                connList.appendChild(li);
            }
        });

        sidebar.classList.add("open");
    }

    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
    }

    document.getElementById("sidebar-close").addEventListener("click", (e) => {
        e.stopPropagation();
        closeSidebar();
        resetHighlight();
    });

    function highlightConnections(d) {
        const connectedIds = new Set();
        connectedIds.add(d.id);

        links.forEach(l => {
            const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
            const targetId = typeof l.target === 'string' ? l.target : l.target.id;
            if (sourceId === d.id) connectedIds.add(targetId);
            if (targetId === d.id) connectedIds.add(sourceId);
        });

        node.attr("opacity", n => connectedIds.has(n.id) ? 1 : 0.1);
        label.attr("opacity", n => connectedIds.has(n.id) ? 1 : 0.05);
        link.attr("opacity", l => {
            const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
            const targetId = typeof l.target === 'string' ? l.target : l.target.id;
            return (sourceId === d.id || targetId === d.id) ? 0.8 : 0.03;
        });
        edgeLabel.attr("opacity", l => {
            const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
            const targetId = typeof l.target === 'string' ? l.target : l.target.id;
            return (sourceId === d.id || targetId === d.id) ? 1 : 0;
        });
    }

    function resetHighlight() {
        node.attr("opacity", 1);
        label.attr("opacity", 1);
        link.attr("opacity", 0.3);
        edgeLabel.attr("opacity", 1);
    }

    // ============================================================
    // SEARCH
    // ============================================================
    document.getElementById("search-input").addEventListener("input", function() {
        const query = this.value.toLowerCase().trim();
        if (!query) {
            resetHighlight();
            return;
        }

        const matchedIds = new Set();
        nodes.forEach(n => {
            if (n.label.toLowerCase().includes(query) || n.description.toLowerCase().includes(query) || n.category.toLowerCase().includes(query)) {
                matchedIds.add(n.id);
            }
        });

        // Also highlight connected links
        const connectedIds = new Set(matchedIds);
        links.forEach(l => {
            const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
            const targetId = typeof l.target === 'string' ? l.target : l.target.id;
            if (matchedIds.has(sourceId)) connectedIds.add(targetId);
            if (matchedIds.has(targetId)) connectedIds.add(sourceId);
        });

        node.attr("opacity", n => matchedIds.has(n.id) ? 1 : 0.1);
        label.attr("opacity", n => matchedIds.has(n.id) ? 1 : 0.05);
        link.attr("opacity", l => {
            const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
            const targetId = typeof l.target === 'string' ? l.target : l.target.id;
            return (matchedIds.has(sourceId) || matchedIds.has(targetId)) ? 0.6 : 0.03;
        });
        edgeLabel.attr("opacity", l => {
            const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
            const targetId = typeof l.target === 'string' ? l.target : l.target.id;
            return (matchedIds.has(sourceId) || matchedIds.has(targetId)) ? 1 : 0;
        });
    });

    // ============================================================
    // LEGEND FILTER
    // ============================================================
    document.querySelectorAll(".legend-item").forEach(item => {
        item.addEventListener("click", () => {
            const cat = item.dataset.category;
            const matchedIds = new Set();
            nodes.forEach(n => { if (n.category === cat) matchedIds.add(n.id); });

            node.attr("opacity", n => matchedIds.has(n.id) ? 1 : 0.1);
            label.attr("opacity", n => matchedIds.has(n.id) ? 1 : 0.05);
            link.attr("opacity", l => {
                const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                return (matchedIds.has(sourceId) || matchedIds.has(targetId)) ? 0.6 : 0.03;
            });
            edgeLabel.attr("opacity", l => {
                const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                return (matchedIds.has(sourceId) || matchedIds.has(targetId)) ? 1 : 0;
            });
        });
    });

    // Stats
    document.getElementById("stats-bar").textContent = `${nodes.length} NODES · ${links.length} CONNECTIONS · ${new Set(nodes.map(n => n.category)).size} CATEGORIES`;

    </script>
</body>
</html>
